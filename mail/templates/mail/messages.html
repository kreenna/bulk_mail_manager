{% extends 'base.html' %}
{% block title %}Сообщения{% endblock %}
{% block content %}

<div class="container text-center" style="max-width: 1100px;">
    <div class="row justify-content-start row-cols-4">
        <div class="col-3 mt-3">
            <a class="btn btn-light pt-0"
               style="--bs-btn-padding-y: 2.6rem; --bs-btn-padding-x: 4.569rem; --bs-btn-font-size: 10.00rem;"
               href="/mail/message/create/">+</a>
        </div>
        {% for message in messages %}
        <div class="col-3 mt-3">
            <div class="card mb-4 box-shadow h-100">
                <div class="card-header">
                    <h4 class="my-0 font-weight-normal">{{ message.subject }}</h4>
                </div>
                <div class="card-body text-center">
                    <h5>{{ message.content|truncatechars:100 }}</h5>
                    <a class="p-2 btn btn-primary" href="/mail/message/detail/{{ message.id }}">Подробнее</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
