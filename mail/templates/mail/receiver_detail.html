{% extends 'base.html' %}
{% block title %}Получатель{% endblock %}
{% block content %}
<div class="container overflow-hidden">
    <div class="row gx-5">
        <div class="col">
            <div class="p-3">
                <h1 class="">{{ receiver.full_name }}</h1>
                <div class="fs-5 mt-3">
                    <p>Электронная почта: {{ receiver.email }}</p>
                    <p>{{ receiver.comment }}</p>
                </div>
            </div>
            <div class="d-grid gap-0 row-gap-3">
                <a class="p-2 btn btn-lg btn-outline-primary"
                   href="/mail/receiver/edit/{{ receiver.id }}">Редактировать</a>
                <a class="p-2 btn btn-lg btn-outline-danger" href="/mail/receiver/delete/{{ receiver.id }}">Удалить</a>
                <a class="p-2 btn btn-lg btn-outline-secondary" href="/mail/receivers/">Назад</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
