{% extends 'base.html' %}
{% block title %}{{ post.title }}{% endblock %}
{% block content %}

<div class="pricing-header px-3 py-3 pt-md-5 pb-md-4 mx-auto text-center">
    <h1 class="display-4">{{ message.subject }}</h1>
</div>

<div class="container overflow-hidden text-center">
    <div class="col">
        <div class="p-3">
            <p class="fst-normal">{{ message.content }}</p>
        </div>
        <a class="p-2 btn btn-lg btn-outline-primary" href="/mail/message/edit/{{ message.id }}">Редактировать</a>
        <a class="p-2 btn btn-lg btn-outline-danger" href="/mail/message/delete/{{ message.id }}">Удалить</a>
        <a class="p-2 btn btn-lg btn-outline-primary" href="/mail/messages/">Назад</a>
    </div>
</div>
{% endblock %}
