{% extends 'base.html' %}
{% block title %}Ваш профиль{% endblock %}
{% block content %}
<div class="container overflow-hidden">
    <div class="row gx-5">
        <div class="col">
            <div class="p-3">
                <h1 class="">{{ user.first_name }} {{ user.last_name }}</h1>
                <div class="fs-5 mt-3">
                    <p>Электронная почта: {{ user.email }}</p>
                </div>
            </div>
            <div class="d-grid gap-0 row-gap-3">
                <a class="p-2 btn btn-lg btn-outline-primary" href="/profile/edit/{{ user.id }}">Редактировать</a>
                <a class="p-2 btn btn-lg btn-outline-primary" href="/password_change/">Смена пароля</a>
                <a class="p-2 btn btn-lg btn-outline-danger" href="/profile/delete/{{ user.id }}">Удалить профиль</a>
                <a class="p-2 btn btn-lg btn-outline-secondary" href="/">Назад</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
